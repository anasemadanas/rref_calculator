<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">

    <a href="index.html">

	<!-- generate -->
	<div class="container">
		<h1>REF / RREF Matrix Solver</h1>
	<div class="controls">
		<div class="input-group">
			<label for="rows">Rows</label>
			<input id="rows" type="number" min="1" max="10" value="3">
		</div>
		<div class="input-group">
			<label for="cols">Columns</label>
			<input id="cols" type="number" min="1" max="10" value="3">
		</div>

	<button type="button" onclick="playSound('soundClick'); createMatrix()">
	Generate Matrix
	</button>	
	</div>

	<!-- tables input -->
	<h2>Matrix Input</h2>
	<div id="matrixInput"></div>

	<!-- buttons -->
	<div class="buttons">
		<button type="button" onclick="randomMatrix()">
		Random Matrix
		</button>
		<button type="button" onclick="zeroMatrix()">
		Fill with Zeros
		</button>
		<button type="button" onclick="playSound('soundCalculate'); solveREF()">
		Solve REF
		</button>
		<button type="button" onclick="playSound('soundCalculate'); solveRREF()">
		Solve RREF
		</button>
		<button type="button" onclick="playSound('soundRemove'); clearAll()">
		Reset All
		</button>
	</div>

	<!-- Sections -->
	<section>
		<h2>Original System of Equations</h2>
		<div id="originalEquations" class="equations"></div>
	</section>
	<section class="result-box">
		<h2>Reduced Result Matrix</h2>
		<div id="result"></div>
	</section>
	<section>
		<h2>Solution</h2>
		<div id="solutionEquations" class="equations"></div>
	</section>
	<section>
		<h2>Solution Type</h2>
		<div id="solutionType" class="solution-type">
	</div>
	</section>
	<section class="steps-box">
		<h2>Calculation Steps</h2>
		<div id="steps"></div>
	</section>
</div>
